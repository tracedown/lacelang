name: Release Testkit

on:
  push:
    tags: ["testkit-v*"]

jobs:
  build:
    if: github.repository == 'tracedown/lacelang'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lace-conformance-linux-x86_64
          - os: macos-latest
            artifact: lace-conformance-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cd testkit/src && make EMBED_VECTORS=1

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd testkit/src && make EMBED_VECTORS=1 \
            CFLAGS="-std=c99 -Wall -Wextra -Wpedantic -O2 -D_POSIX_C_SOURCE=200809L -D_GNU_SOURCE -Ithird_party/cjson -DLACE_CONFORMANCE_VERSION='\"$(cat ../../VERSION)\"' -DWITH_TLS -Wno-overlength-strings -I$(brew --prefix openssl@3)/include" \
            LDFLAGS="-L$(brew --prefix openssl@3)/lib -lpthread -lssl -lcrypto"

      - name: Rename binary
        run: cp testkit/src/build/lace-conformance ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum lace-conformance-* > checksums-sha256.txt

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  build-deb:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev dpkg-dev debhelper

      - name: Build deb package
        run: |
          cd testkit
          dpkg-buildpackage -us -uc -b

      - name: Upload deb to release
        run: |
          gh release upload "${{ github.ref_name }}" ../lacelang-testkit_*.deb
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
