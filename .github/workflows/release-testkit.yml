name: Release Testkit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'testkit/**'
      - 'extensions/**'
      - 'VERSION'

jobs:
  check:
    if: github.repository == 'tracedown/lacelang'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.tag.outputs.created }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=testkit-v$version" >> "$GITHUB_OUTPUT"

      - name: Create tag if new
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lace-conformance-linux-x86_64
          - os: macos-latest
            artifact: lace-conformance-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cd testkit/src && make EMBED_VECTORS=1

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cd testkit/src && make EMBED_VECTORS=1 OPENSSL_PREFIX=$(brew --prefix openssl@3)

      - name: Rename binary
        run: cp testkit/src/build/lace-conformance ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum lace-conformance-* > checksums-sha256.txt

      - name: Create GitHub Release
        run: |
          gh release create "testkit-v${{ needs.check.outputs.version }}" \
            --title "testkit-v${{ needs.check.outputs.version }}" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

  build-deb:
    needs: [check, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev dpkg-dev debhelper build-essential

      - name: Build deb package
        run: |
          cd testkit
          ln -s packaging/debian debian
          dpkg-buildpackage -us -uc -b

      - name: Upload deb to release
        run: |
          gh release upload "testkit-v${{ needs.check.outputs.version }}" lacelang-testkit_*.deb
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
